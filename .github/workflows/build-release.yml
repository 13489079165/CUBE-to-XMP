name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install pyinstaller customtkinter darkdetect tkinterdnd2
      
      - name: Build executable
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "CUBE-to-XMP" --add-data "built_in_luts;built_in_luts/" --hidden-import tkinterdnd2 --hidden-import customtkinter cube_to_xmp.py
      
      - name: Create zip
        run: |
          Compress-Archive -Path dist/CUBE-to-XMP -DestinationPath dist/CUBE-to-XMP-v2.0-windows-x64.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/CUBE-to-XMP-v2.0-windows-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install pyinstaller customtkinter darkdetect tkinterdnd2
      
      - name: Build executable
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "CUBE-to-XMP" --add-data "built_in_luts:built_in_luts/" --hidden-import tkinterdnd2 --hidden-import customtkinter cube_to_xmp.py
      
      - name: Create zip
        run: |
          cd dist && zip -r CUBE-to-XMP-v2.0-macos.zip CUBE-to-XMP
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/CUBE-to-XMP-v2.0-macos.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install pyinstaller customtkinter darkdetect tkinterdnd2
      
      - name: Build executable
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "CUBE-to-XMP" --add-data "built_in_luts:built_in_luts/" --hidden-import tkinterdnd2 --hidden-import customtkinter cube_to_xmp.py
      
      - name: Create zip
        run: |
          cd dist && zip -r CUBE-to-XMP-v2.0-linux-x64.zip CUBE-to-XMP
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/CUBE-to-XMP-v2.0-linux-x64.zip

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-build/*.zip
            artifacts/macos-build/*.zip
            artifacts/linux-build/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
